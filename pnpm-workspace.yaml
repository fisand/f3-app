packages:
  - apps/*
  - packages/*
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.1.20
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.20
  vite-plus: 0.1.20
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
  react: 19.2.3
  react-dom: 19.2.3
  'app-user>react': 19.2.0
  'app-user>react-dom': 19.2.0
  '@types/react': 19.1.9
  '@types/react-dom': 19.1.7
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
    react: '19.2.0 || 19.2.3'
    react-dom: '19.2.0 || 19.2.3'
